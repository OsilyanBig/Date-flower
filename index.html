<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.scene{position:relative;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
svg.bouquet{position:relative;z-index:1;max-height:95vh;max-width:95vw;filter:drop-shadow(0 0 40px rgba(200,50,80,0.25));opacity:0;animation:bouquetIn 2.5s ease-out forwards}

@keyframes bouquetIn{
  0%{opacity:0;transform:scale(0.2) translateY(80px)}
  60%{opacity:1;transform:scale(1.03) translateY(-10px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

.breathe{animation:breathe 5s ease-in-out infinite 3s}
@keyframes breathe{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.012) rotate(0.3deg)}}

/* Falling petals */
.fpetal{position:fixed;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;opacity:0;pointer-events:none;z-index:2;animation:fall linear infinite}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0}
  8%{opacity:.65}
  50%{transform:translateY(50vh) rotate(360deg) translateX(40px);opacity:.5}
  100%{transform:translateY(100vh) rotate(720deg) translateX(-20px);opacity:0}
}

.sparkle{position:fixed;width:3px;height:3px;background:#fff;border-radius:50%;opacity:0;pointer-events:none;z-index:2;box-shadow:0 0 6px 2px rgba(255,200,220,0.8);animation:sp 2.5s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

.bgstar{position:fixed;background:rgba(255,255,255,0.5);border-radius:50%;animation:tw 3s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.8}}

.glow-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(40px);animation:gorb 4s ease-in-out infinite}
@keyframes gorb{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
</style>
</head>

<script>
// Stars
const bgs=document.createElement('div');document.body.appendChild(bgs);
for(let i=0;i<100;i++){const s=document.createElement('div');s.className='bgstar';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;bgs.appendChild(s)}

// Glow orbs
const colors=['rgba(200,50,80,0.15)','rgba(180,60,100,0.12)','rgba(220,80,120,0.1)'];
for(let i=0;i<3;i++){const o=document.createElement('div');o.className='glow-orb';o.style.cssText=`left:${20+i*25}%;top:${20+Math.random()*30}%;width:${200+Math.random()*150}px;height:${200+Math.random()*150}px;background:radial-gradient(circle,${colors[i]},transparent);animation-delay:${i*1.3}s`;document.body.appendChild(o)}

// Falling petals
for(let i=0;i<18;i++){const p=document.createElement('div');p.className='fpetal';const sz=6+Math.random()*10;p.style.cssText=`left:${5+Math.random()*90}%;width:${sz}px;height:${sz*1.15}px;background:radial-gradient(ellipse,${['#c8324f','#d44060','#f080a8','#ffa0c0','#e8d0d8','#ffffff'][Math.floor(Math.random()*6)]},${['#8b1a3a','#a02845','#c85080','#d4c0c8'][Math.floor(Math.random()*4)]});animation-duration:${7+Math.random()*10}s;animation-delay:${Math.random()*12}s`;document.body.appendChild(p)}

// Sparkles
for(let i=0;i<25;i++){const s=document.createElement('div');s.className='sparkle';s.style.cssText=`left:${10+Math.random()*80}%;top:${10+Math.random()*70}%;animation-delay:${1+Math.random()*6}s;animation-duration:${1.5+Math.random()*2}s`;document.body.appendChild(s)}
</script>
