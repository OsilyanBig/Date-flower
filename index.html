<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavi Çiçek Buketi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 30%, #0d1b3e 60%, #0a0a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
            position: relative;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        .bouquet-container {
            position: relative;
            width: 380px;
            height: 600px;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .bouquet-container {
                width: 320px;
                height: 520px;
                transform: scale(0.85);
            }
        }

        @media (max-width: 360px) {
            .bouquet-container {
                transform: scale(0.75);
            }
        }

        /* SVG Bouquet */
        .bouquet-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(100, 149, 237, 0.3));
        }

        /* Glow effects */
        .glow-center {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(100, 149, 237, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseGlow 3s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* Flower animations */
        .flower-group {
            transform-origin: center bottom;
            animation: flowerSway 4s ease-in-out infinite;
        }

        .flower-group:nth-child(odd) {
            animation-delay: -1s;
            animation-duration: 3.5s;
        }

        .flower-group:nth-child(even) {
            animation-delay: -2s;
            animation-duration: 4.5s;
        }

        @keyframes flowerSway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        /* Petal shimmer */
        .petal {
            animation: petalShimmer 3s ease-in-out infinite;
        }

        .petal:nth-child(1) { animation-delay: 0s; }
        .petal:nth-child(2) { animation-delay: 0.3s; }
        .petal:nth-child(3) { animation-delay: 0.6s; }
        .petal:nth-child(4) { animation-delay: 0.9s; }
        .petal:nth-child(5) { animation-delay: 1.2s; }

        @keyframes petalShimmer {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 1; }
        }

        /* Sparkles */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkleAnim 2s ease-in-out infinite;
            box-shadow: 0 0 6px 2px rgba(173, 216, 230, 0.8);
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Title */
        .title {
            color: transparent;
            background: linear-gradient(90deg, #87CEEB, #6495ED, #4169E1, #87CEEB);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            z-index: 2;
            animation: shineText 3s linear infinite;
            letter-spacing: 3px;
        }

        .subtitle {
            color: rgba(173, 216, 230, 0.7);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
            z-index: 2;
            letter-spacing: 5px;
            animation: fadeInUp 2s ease-out;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Butterfly */
        .butterfly {
            position: absolute;
            z-index: 3;
            animation: butterflyFly 12s ease-in-out infinite;
        }

        @keyframes butterflyFly {
            0% { top: 25%; left: 15%; }
            25% { top: 15%; left: 70%; }
            50% { top: 35%; left: 60%; }
            75% { top: 10%; left: 30%; }
            100% { top: 25%; left: 15%; }
        }

        .wing-left, .wing-right {
            animation: wingFlap 0.3s ease-in-out infinite alternate;
        }

        .wing-right {
            animation-delay: 0.15s;
        }

        @keyframes wingFlap {
            from { transform: scaleX(1); }
            to { transform: scaleX(0.3); }
        }

        /* Water drops */
        .water-drop {
            animation: dropGlisten 2.5s ease-in-out infinite;
        }

        @keyframes dropGlisten {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Ribbon animation */
        .ribbon-flow {
            animation: ribbonWave 3s ease-in-out infinite;
            transform-origin: top center;
        }

        @keyframes ribbonWave {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        /* Bottom decoration */
        .bottom-glow {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 100px;
            background: radial-gradient(ellipse, rgba(65, 105, 225, 0.15) 0%, transparent 70%);
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="title">✦ MAVİ RÜYA ✦</div>
    <div class="subtitle">BİR BUKET MAVİ</div>

    <div class="bouquet-container">
        <div class="glow-center"></div>
        <div class="bottom-glow"></div>

        <!-- Sparkles -->
        <div class="sparkle" style="top:10%;left:20%;animation-delay:0s;"></div>
        <div class="sparkle" style="top:15%;left:70%;animation-delay:0.5s;"></div>
        <div class="sparkle" style="top:25%;left:45%;animation-delay:1s;"></div>
        <div class="sparkle" style="top:5%;left:55%;animation-delay:1.5s;"></div>
        <div class="sparkle" style="top:20%;left:30%;animation-delay:0.7s;"></div>
        <div class="sparkle" style="top:30%;left:65%;animation-delay:1.2s;"></div>
        <div class="sparkle" style="top:8%;left:40%;animation-delay:0.3s;"></div>
        <div class="sparkle" style="top:35%;left:25%;animation-delay:1.8s;"></div>

        <!-- Butterfly -->
        <div class="butterfly">
            <svg width="40" height="30" viewBox="0 0 40 30">
                <g class="wing-left" transform-origin="20 15">
                    <ellipse cx="12" cy="10" rx="10" ry="7" fill="rgba(100,149,237,0.6)" stroke="rgba(173,216,230,0.8)" stroke-width="0.5"/>
                    <ellipse cx="14" cy="18" rx="7" ry="5" fill="rgba(65,105,225,0.5)" stroke="rgba(173,216,230,0.6)" stroke-width="0.5"/>
                </g>
                <g class="wing-right" transform-origin="20 15">
                    <ellipse cx="28" cy="10" rx="10" ry="7" fill="rgba(100,149,237,0.6)" stroke="rgba(173,216,230,0.8)" stroke-width="0.5"/>
                    <ellipse cx="26" cy="18" rx="7" ry="5" fill="rgba(65,105,225,0.5)" stroke="rgba(173,216,230,0.6)" stroke-width="0.5"/>
                </g>
                <ellipse cx="20" cy="15" rx="1.5" ry="8" fill="rgba(30,60,150,0.8)"/>
                <line x1="18" y1="5" x2="15" y2="1" stroke="rgba(173,216,230,0.7)" stroke-width="0.5"/>
                <line x1="22" y1="5" x2="25" y2="1" stroke="rgba(173,216,230,0.7)" stroke-width="0.5"/>
                <circle cx="15" cy="1" r="1" fill="rgba(173,216,230,0.8)"/>
                <circle cx="25" cy="1" r="1" fill="rgba(173,216,230,0.8)"/>
            </svg>
        </div>

        <svg class="bouquet-svg" viewBox="0 0 380 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Gradients -->
                <radialGradient id="petalBlue1" cx="50%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#87CEEB"/>
                    <stop offset="40%" stop-color="#6495ED"/>
                    <stop offset="100%" stop-color="#3A5BA0"/>
                </radialGradient>
                <radialGradient id="petalBlue2" cx="50%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#B0D4F1"/>
                    <stop offset="40%" stop-color="#4682B4"/>
                    <stop offset="100%" stop-color="#2E4A7A"/>
                </radialGradient>
                <radialGradient id="petalBlue3" cx="50%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#ADD8E6"/>
                    <stop offset="50%" stop-color="#4169E1"/>
                    <stop offset="100%" stop-color="#1E3A6E"/>
                </radialGradient>
                <radialGradient id="petalBlue4" cx="40%" cy="30%" r="65%">
                    <stop offset="0%" stop-color="#E0EFFF"/>
                    <stop offset="30%" stop-color="#7EC8E3"/>
                    <stop offset="100%" stop-color="#2B5DA6"/>
                </radialGradient>
                <radialGradient id="petalDeep" cx="50%" cy="40%" r="60%">
                    <stop offset="0%" stop-color="#6A8FD8"/>
                    <stop offset="50%" stop-color="#3B5998"/>
                    <stop offset="100%" stop-color="#1B2A5C"/>
                </radialGradient>
                <radialGradient id="roseCenter" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#C8E0FF"/>
                    <stop offset="100%" stop-color="#5B7FC7"/>
                </radialGradient>
                <radialGradient id="hydrangea" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#9BC4E2"/>
                    <stop offset="100%" stop-color="#5078AA"/>
                </radialGradient>
                <linearGradient id="stemGreen" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#2D5A3D"/>
                    <stop offset="100%" stop-color="#1A3A28"/>
                </linearGradient>
                <linearGradient id="leafGreen" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#3A7D4A"/>
                    <stop offset="100%" stop-color="#1E4D30"/>
                </linearGradient>
                <linearGradient id="wrapGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#1E3A6E"/>
                    <stop offset="50%" stop-color="#2B4A8E"/>
                    <stop offset="100%" stop-color="#162D5A"/>
                </linearGradient>
                <linearGradient id="wrapOverlay" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="rgba(173,216,230,0.15)"/>
                    <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
                </linearGradient>
                <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#87CEEB"/>
                    <stop offset="50%" stop-color="#4FC3F7"/>
                    <stop offset="100%" stop-color="#29B6F6"/>
                </linearGradient>
                <linearGradient id="ribbonDark" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#4FC3F7"/>
                    <stop offset="100%" stop-color="#0288D1"/>
                </linearGradient>

                <!-- Filters -->
                <filter id="softGlow">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="dropShadow">
                    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,50,0.3)"/>
                </filter>
            </defs>

            <!-- ====== WRAPPING PAPER ====== -->
            <g filter="url(#dropShadow)">
                <!-- Main wrap shape -->
                <path d="M120,340 Q110,360 95,430 Q85,480 100,530 L110,560 Q120,575 140,580 L240,580 Q260,575 270,560 L280,530 Q295,480 285,430 Q270,360 260,340 Z" 
                      fill="url(#wrapGrad)" stroke="rgba(100,149,237,0.3)" stroke-width="1"/>
                <!-- Wrap texture overlay -->
                <path d="M120,340 Q110,360 95,430 Q85,480 100,530 L110,560 Q120,575 140,580 L240,580 Q260,575 270,560 L280,530 Q295,480 285,430 Q270,360 260,340 Z" 
                      fill="url(#wrapOverlay)"/>
                <!-- Wrap fold lines -->
                <path d="M140,345 Q130,400 125,460 Q122,500 130,550" stroke="rgba(173,216,230,0.12)" stroke-width="1" fill="none"/>
                <path d="M170,340 Q160,400 158,460 Q156,510 160,565" stroke="rgba(173,216,230,0.08)" stroke-width="1" fill="none"/>
                <path d="M210,340 Q220,400 222,460 Q224,510 220,565" stroke="rgba(173,216,230,0.08)" stroke-width="1" fill="none"/>
                <path d="M240,345 Q250,400 255,460 Q258,500 250,550" stroke="rgba(173,216,230,0.12)" stroke-width="1" fill="none"/>
                
                <!-- Top wrap flaps -->
                <path d="M120,340 Q115,330 100,325 Q90,330 88,340 Q95,360 120,355 Z" 
                      fill="#2B4A8E" stroke="rgba(100,149,237,0.2)" stroke-width="0.5"/>
                <path d="M260,340 Q265,330 280,325 Q290,330 292,340 Q285,360 260,355 Z" 
                      fill="#2B4A8E" stroke="rgba(100,149,237,0.2)" stroke-width="0.5"/>
                
                <!-- Paper texture dots -->
                <circle cx="150" cy="420" r="0.5" fill="rgba(173,216,230,0.15)"/>
                <circle cx="200" cy="450" r="0.5" fill="rgba(173,216,230,0.12)"/>
                <circle cx="230" cy="400" r="0.5" fill="rgba(173,216,230,0.15)"/>
                <circle cx="170" cy="480" r="0.5" fill="rgba(173,216,230,0.10)"/>
                <circle cx="210" cy="510" r="0.5" fill="rgba(173,216,230,0.12)"/>
            </g>

            <!-- ====== RIBBON ====== -->
            <g class="ribbon-flow">
                <!-- Ribbon bow center -->
                <ellipse cx="190" cy="355" rx="12" ry="8" fill="url(#ribbonGrad)" filter="url(#softGlow)"/>
                
                <!-- Bow loops -->
                <path d="M190,355 Q160,335 150,345 Q145,355 165,360 Q180,362 190,355Z" 
                      fill="url(#ribbonGrad)" opacity="0.9" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
                <path d="M190,355 Q220,335 230,345 Q235,355 215,360 Q200,362 190,355Z" 
                      fill="url(#ribbonGrad)" opacity="0.9" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
                
                <!-- Ribbon tails -->
                <path d="M175,360 Q165,390 155,420 Q150,425 145,420" 
                      fill="none" stroke="url(#ribbonDark)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
                <path d="M205,360 Q215,395 225,425 Q230,430 235,425" 
                      fill="none" stroke="url(#ribbonDark)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
                
                <!-- Ribbon highlights -->
                <path d="M175,360 Q165,390 155,420" 
                      fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
                <path d="M205,360 Q215,395 225,425" 
                      fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
            </g>

            <!-- ====== STEMS ====== -->
            <g>
                <path d="M190,340 Q185,300 170,250 Q160,220 155,180" stroke="url(#stemGreen)" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q195,300 210,260 Q220,230 230,200" stroke="url(#stemGreen)" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q180,290 160,240 Q145,200 130,160" stroke="url(#stemGreen)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q200,280 225,240 Q240,210 250,180" stroke="url(#stemGreen)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q188,280 185,230 Q183,195 180,150" stroke="url(#stemGreen)" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q195,270 200,220 Q205,190 210,155" stroke="url(#stemGreen)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q175,285 155,230 Q135,190 115,165" stroke="url(#stemGreen)" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q210,285 235,235 Q250,205 265,180" stroke="url(#stemGreen)" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M190,340 Q190,280 195,230 Q198,200 200,170 Q202,145 195,120" stroke="url(#stemGreen)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </g>

            <!-- ====== LEAVES ====== -->
            <g>
                <path d="M160,280 Q140,265 125,275 Q130,290 155,285Z" fill="url(#leafGreen)" opacity="0.85"/>
                <path d="M160,280 Q142,270 130,278" stroke="rgba(100,160,100,0.4)" stroke-width="0.5" fill="none"/>
                
                <path d="M215,270 Q235,255 248,268 Q240,282 218,275Z" fill="url(#leafGreen)" opacity="0.85"/>
                <path d="M215,270 Q237,260 244,270" stroke="rgba(100,160,100,0.4)" stroke-width="0.5" fill="none"/>
                
                <path d="M170,310 Q148,300 138,312 Q145,325 168,315Z" fill="url(#leafGreen)" opacity="0.8"/>
                <path d="M220,305 Q242,295 250,308 Q244,320 222,312Z" fill="url(#leafGreen)" opacity="0.8"/>
                
                <path d="M145,250 Q125,240 118,250 Q125,262 143,255Z" fill="url(#leafGreen)" opacity="0.7"/>
                <path d="M235,245 Q255,238 262,248 Q255,260 238,252Z" fill="url(#leafGreen)" opacity="0.7"/>

                <!-- Small accent leaves -->
                <path d="M175,260 Q162,252 155,258 Q160,267 173,263Z" fill="url(#leafGreen)" opacity="0.6"/>
                <path d="M205,255 Q218,247 225,253 Q220,262 207,258Z" fill="url(#leafGreen)" opacity="0.6"/>
            </g>

            <!-- ====== FLOWER: Large Blue Rose (Center Top) ====== -->
            <g class="flower-group" filter="url(#softGlow)">
                <!-- Outer petals -->
                <ellipse class="petal" cx="180" cy="120" rx="28" ry="18" transform="rotate(-30, 180, 140)" fill="url(#petalBlue1)" opacity="0.8"/>
                <ellipse class="petal" cx="200" cy="115" rx="28" ry="18" transform="rotate(20, 195, 140)" fill="url(#petalBlue2)" opacity="0.8"/>
                <ellipse class="petal" cx="175" cy="140" rx="25" ry="16" transform="rotate(-60, 175, 145)" fill="url(#petalBlue3)" opacity="0.85"/>
                <ellipse class="petal" cx="210" cy="138" rx="25" ry="16" transform="rotate(50, 208, 142)" fill="url(#petalBlue1)" opacity="0.85"/>
                <ellipse class="petal" cx="190" cy="150" rx="22" ry="14" transform="rotate(5, 190, 150)" fill="url(#petalBlue4)" opacity="0.8"/>
                
                <!-- Middle petals -->
                <ellipse cx="185" cy="128" rx="18" ry="12" transform="rotate(-15, 185, 130)" fill="url(#petalBlue2)" opacity="0.9"/>
                <ellipse cx="198" cy="125" rx="18" ry="12" transform="rotate(25, 198, 128)" fill="url(#petalBlue4)" opacity="0.9"/>
                <ellipse cx="182" cy="138" rx="15" ry="10" transform="rotate(-40, 182, 138)" fill="url(#petalBlue3)" opacity="0.9"/>
                <ellipse cx="200" cy="136" rx="15" ry="10" transform="rotate(35, 200, 136)" fill="url(#petalBlue1)" opacity="0.9"/>
                
                <!-- Inner spiral petals -->
                <ellipse cx="188" cy="130" rx="10" ry="7" transform="rotate(-10, 188, 130)" fill="url(#petalBlue4)" opacity="0.95"/>
                <ellipse cx="195" cy="128" rx="10" ry="7" transform="rotate(15, 195, 128)" fill="#7EB5E0" opacity="0.95"/>
                <ellipse cx="190" cy="133" rx="7" ry="5" transform="rotate(5, 190, 133)" fill="#9ECAE1" opacity="0.95"/>
                
                <!-- Center -->
                <circle cx="191" cy="131" r="4" fill="url(#roseCenter)"/>
                <circle cx="191" cy="131" r="2" fill="#D4E8FF" opacity="0.8"/>
            </g>

            <!-- ====== FLOWER: Rose Left ====== -->
            <g class="flower-group" filter="url(#softGlow)">
                <ellipse class="petal" cx="130" cy="152" rx="22" ry="14" transform="rotate(-40, 130, 160)" fill="url(#petalBlue3)" opacity="0.8"/>
                <ellipse class="petal" cx="148" cy="148" rx="22" ry="14" transform="rotate(15, 148, 158)" fill="url(#petalBlue2)" opacity="0.8"/>
                <ellipse class="petal" cx="125" cy="168" rx="20" ry="12" transform="rotate(-65, 125, 168)" fill="url(#petalBlue1)" opacity="0.85"/>
                <ellipse class="petal" cx="152" cy="165" rx="20" ry="12" transform="rotate(40, 152, 165)" fill="url(#petalBlue4)" opacity="0.85"/>
                <ellipse cx="135" cy="158" rx="14" ry="9" transform="rotate(-20, 135, 158)" fill="url(#petalBlue4)" opacity="0.9"/>
                <ellipse cx="145" cy="155" rx="14" ry="9" transform="rotate(20, 145, 155)" fill="url(#petalBlue2)" opacity="0.9"/>
                <ellipse cx="138" cy="160" rx="8" ry="5" fill="#A5D3F0" opacity="0.95"/>
                <circle cx="139" cy="159" r="3.5" fill="url(#roseCenter)"/>
                <circle cx="139" cy="159" r="1.5" fill="#E0F0FF" opacity="0.8"/>
            </g>

            <!-- ====== FLOWER: Rose Right ====== -->
            <g class="flower-group" filter="url(#softGlow)">
                <ellipse class="petal" cx="248" cy="165" rx="24" ry="15" transform="rotate(35, 248, 172)" fill="url(#petalBlue1)" opacity="0.8"/>
                <ellipse class="petal" cx="232" cy="162" rx="24" ry="15" transform="rotate(-20, 232, 170)" fill="url(#petalBlue3)" opacity="0.8"/>
                <ellipse class="petal" cx="255" cy="180" rx="20" ry="13" transform="rotate(60, 255, 180)" fill="url(#petalBlue4)" opacity="0.85"/>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const colors = [
            'rgba(100, 149, 237, 0.6)',
            'rgba(135, 206, 235, 0.5)',
            'rgba(65, 105, 225, 0.4)',
            'rgba(173, 216, 230, 0.5)',
            'rgba(70, 130, 180, 0.4)',
            'rgba(176, 212, 241, 0.3)',
            'rgba(30, 144, 255, 0.3)'
        ];

        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
            particle.style.animationDelay = (Math.random() * 15) + 's';
            if (size > 3) {
                particle.style.boxShadow = `0 0 ${size * 2}px ${particle.style.background}`;
            }
            particlesContainer.appendChild(particle);
        }
    </script>
