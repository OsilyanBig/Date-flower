<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senin İçin Bir Sürpriz 💙</title>
    <style>
        /* Temel sayfa ayarları */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* Koyu, sofistike arka plan */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
            opacity: 0;
            animation: fadeInPage 2s ease-in forwards; /* Sayfa yavaşça belirsin */
        }

        /* Taşıyıcı div animasyonu */
        .bouquet-container {
            position: relative;
            text-align: center;
            width: 450px;
            height: auto;
            transform: scale(0);
            animation: growBouquet 2s ease-out 1s forwards; /* Buket yavaşça büyüsün */
        }

        /* Soyut Siyah Ambalajın Geometrik Şekilleri */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            z-index: 1;
        }

        .wrapper div {
            background-color: rgba(10, 10, 10, 0.95); /* Çok koyu gri/siyah */
            transform: skew(-15deg);
            opacity: 0.8;
            border-radius: 5px;
        }

        /* Güllerin Yerleşimi ve Görünümü */
        .roses-grid {
            position: relative;
            z-index: 2;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Üzerine gelinemez yap, ambalaja odaklan */
        }

        /* Tek bir gülün CSS sanatıyla oluşturulması */
        .rose {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, #001f5c 10%, #0033a0 40%, #004dcb 80%);
            box-shadow: 0 5px 15px rgba(0, 85, 255, 0.4); /* Mavi parlamalı gölge efekti */
            transition: transform 0.3s ease;
        }

        /* Güllerin katmanlı yapısını simüle etmek için iç şekiller */
        .rose::before,
        .rose::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #002b7a 20%, #0046b0 50%, #005ce6 90%);
        }

        .rose::before {
            transform: scale(0.8) translate(5px, 5px);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .rose::after {
            transform: scale(0.65) translate(-3px, -3px);
            box-shadow: -1px -1px 3px rgba(255, 255, 255, 0.1);
        }

        /* Güllerin rastgele pozisyonlarında hafif oynamalar */
        .rose:nth-child(even) {
            transform: rotate(15deg) translate(2px, -3px);
        }
        .rose:nth-child(3n) {
            transform: rotate(-10deg) translate(-1px, 4px);
        }
        .rose:nth-child(4n) {
            transform: scale(1.1) rotate(5deg) translate(3px, 2px);
        }

        /* Siyah Şerit */
        .ribbon {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(-10deg);
            width: 100px;
            height: 25px;
            background-color: #0a0a0a;
            border-radius: 5px;
            z-index: 3;
            opacity: 0;
            animation: fadeInRibbon 1s ease-out 2.5s forwards; /* Şerit daha sonra belirsin */
        }

        /* Alt kısımdaki mesajın stili ve animasyonu */
        .message {
            position: relative;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #e0e0e0;
            text-shadow: 0px 3px 15px rgba(0, 0, 0, 0.9);
            margin-top: 50px;
            opacity: 0;
            z-index: 4;
            /* Mesajın resimden sonra yavaşça yukarı kayarak gelmesi */
            animation: slideUpMessage 2s ease-out 3s forwards; 
        }

        /* Animasyon Keyframe'leri */
        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes growBouquet {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInRibbon {
            from { opacity: 0; top: -40px; }
            to { opacity: 1; top: -20px; }
        }

        @keyframes slideUpMessage {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil cihazlar için duyarlılık (Responsive) */
        @media (max-width: 600px) {
            .bouquet-container {
                width: 90%;
            }
            .message {
                font-size: 1.4rem;
                padding: 0 15px;
            }
            .roses-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            .rose {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="bouquet-container">
        <!-- Soyut Siyah Ambalaj -->
        <div class="wrapper">
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
        </div>

        <!-- Siyah Şerit -->
        <div class="ribbon"></div>

        <!-- Güller -->
        <div class="roses-grid">
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div><div class="rose"></div>
            <div class="rose"></div><div class="rose"></div>
        </div>
    </div>
    
    <!-- Buradaki metni dilediğin gibi değiştirebilirsin -->
    <div class="message">Mesafelerin hiçbir önemi yok, kalbim hep seninle...</div>

</body>
</html>
