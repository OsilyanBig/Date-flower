<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌹</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }

  .scene {
    position: relative;
    width: 400px;
    height: 550px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* ── Glow behind the rose ── */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(200,50,80,0.25) 0%, transparent 70%);
    border-radius: 50%;
    top: 20%;
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.3); opacity: 1; }
  }

  /* ── SVG Rose ── */
  .rose-svg {
    width: 380px;
    height: 520px;
    filter: drop-shadow(0 0 30px rgba(200,50,80,0.3));
    animation: roseEntrance 2s ease-out forwards;
    opacity: 0;
    transform: scale(0.3) translateY(40px);
  }

  @keyframes roseEntrance {
    0% { opacity: 0; transform: scale(0.3) translateY(40px); }
    60% { opacity: 1; transform: scale(1.05) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .rose-svg .petal {
    animation: petalBloom 2.5s ease-out forwards;
    transform-origin: center 55%;
    opacity: 0;
  }

  @keyframes petalBloom {
    0% { transform: scale(0.1) rotate(0deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .petal-1 { animation-delay: 0.8s; }
  .petal-2 { animation-delay: 1.0s; }
  .petal-3 { animation-delay: 1.2s; }
  .petal-4 { animation-delay: 1.4s; }
  .petal-5 { animation-delay: 1.6s; }
  .petal-6 { animation-delay: 1.0s; }
  .petal-7 { animation-delay: 1.3s; }
  .petal-8 { animation-delay: 0.9s; }
  .petal-9 { animation-delay: 1.5s; }
  .petal-10 { animation-delay: 1.1s; }
  .petal-11 { animation-delay: 1.7s; }
  .petal-12 { animation-delay: 1.9s; }

  .stem-group {
    animation: stemGrow 1.5s ease-out forwards;
    transform-origin: bottom center;
    opacity: 0;
  }

  @keyframes stemGrow {
    0% { opacity: 0; transform: scaleY(0); }
    100% { opacity: 1; transform: scaleY(1); }
  }

  /* ── Floating particles ── */
  .particles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-500px) scale(0); opacity: 0; }
  }

  /* ── Sparkles ── */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    animation: sparkleAnim 2s ease-in-out infinite;
    opacity: 0;
    box-shadow: 0 0 6px 2px rgba(255,200,220,0.8);
  }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* ── Subtle breathing animation for the whole rose ── */
  .rose-container {
    animation: breathe 4s ease-in-out infinite;
    animation-delay: 3s;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.02) rotate(0.5deg); }
  }

  /* ── Background stars ── */
  .bg-stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .bg-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  .scene { z-index: 1; }

  /* ── Falling rose petals ── */
  .falling-petal {
    position: fixed;
    width: 12px;
    height: 14px;
    background: radial-gradient(ellipse, #c8324f, #8b1a3a);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    animation: fallPetal linear infinite;
  }

  @keyframes fallPetal {
    0% { transform: translateY(-20px) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Background Stars -->
<div class="bg-stars" id="bgStars"></div>

<!-- Falling Petals -->
<div id="fallingPetals"></div>

<div class="scene">
  <div class="glow"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Sparkles -->
  <div id="sparkles"></div>

  <div class="rose-container">
    <svg class="rose-svg" viewBox="0 0 400 550" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Petal gradients -->
        <radialGradient id="petalGrad1" cx="40%" cy="30%">
          <stop offset="0%" stop-color="#e84373"/>
          <stop offset="40%" stop-color="#c8324f"/>
          <stop offset="100%" stop-color="#7a1a33"/>
        </radialGradient>
        <radialGradient id="petalGrad2" cx="50%" cy="40%">
          <stop offset="0%" stop-color="#f0587a"/>
          <stop offset="50%" stop-color="#d43a5c"/>
          <stop offset="100%" stop-color="#8b1a3a"/>
        </radialGradient>
        <radialGradient id="petalGrad3" cx="60%" cy="35%">
          <stop offset="0%" stop-color="#ff6b8a"/>
          <stop offset="40%" stop-color="#e04468"/>
          <stop offset="100%" stop-color="#6b142e"/>
        </radialGradient>
        <radialGradient id="petalGradInner" cx="50%" cy="50%">
          <stop offset="0%" stop-color="#d44060"/>
          <stop offset="60%" stop-color="#a02845"/>
          <stop offset="100%" stop-color="#5c0f25"/>
        </radialGradient>
        <radialGradient id="petalGradDeep" cx="50%" cy="50%">
          <stop offset="0%" stop-color="#b8304a"/>
          <stop offset="100%" stop-color="#4a0d1e"/>
        </radialGradient>

        <!-- Stem gradient -->
        <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2d6b30"/>
          <stop offset="50%" stop-color="#1e5425"/>
          <stop offset="100%" stop-color="#163d1a"/>
        </linearGradient>

        <!-- Leaf gradient -->
        <radialGradient id="leafGrad" cx="30%" cy="40%">
          <stop offset="0%" stop-color="#3a8c3f"/>
          <stop offset="50%" stop-color="#2d6b30"/>
          <stop offset="100%" stop-color="#1a4d1e"/>
        </radialGradient>
        <radialGradient id="leafGrad2" cx="70%" cy="40%">
          <stop offset="0%" stop-color="#45993a"/>
          <stop offset="50%" stop-color="#2d6b30"/>
          <stop offset="100%" stop-color="#1a4d1e"/>
        </radialGradient>

        <!-- Sepal gradient -->
        <linearGradient id="sepalGrad" x1="0.5" y1="0" x2="0.5" y2="1">
          <stop offset="0%" stop-color="#2a7a2e"/>
          <stop offset="100%" stop-color="#1a4d1e"/>
        </linearGradient>

        <!-- Dew drop -->
        <radialGradient id="dewDrop" cx="35%" cy="35%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
          <stop offset="50%" stop-color="rgba(255,255,255,0.3)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
        </radialGradient>

        <!-- Filters -->
        <filter id="softShadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3a0a15" flood-opacity="0.3"/>
        </filter>
        <filter id="petalShadow">
          <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#2a0510" flood-opacity="0.4"/>
        </filter>
      </defs>

      <!-- ===== STEM ===== -->
      <g class="stem-group">
        <!-- Main stem -->
        <path d="M200 280 Q198 320 196 360 Q194 400 197 440 Q199 470 200 510"
              stroke="url(#stemGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- Stem highlight -->
        <path d="M199 285 Q197 325 196 365 Q194 400 196 435"
              stroke="rgba(80,160,80,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Thorns -->
        <path d="M197 370 Q190 364 188 358" stroke="#2d6b30" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M198 410 Q206 404 208 398" stroke="#2d6b30" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M197 450 Q190 445 187 440" stroke="#2d6b30" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Left leaf -->
        <g transform="translate(148, 385) rotate(-25)">
          <path d="M0 0 Q-15 -12 -38 -18 Q-50 -20 -48 -10 Q-42 5 -20 12 Q-5 16 0 0Z"
                fill="url(#leafGrad)" filter="url(#softShadow)"/>
          <path d="M0 0 Q-22 -6 -42 -12" stroke="rgba(26,77,30,0.5)" stroke-width="1" fill="none"/>
          <path d="M-10 -2 Q-18 -10 -28 -14" stroke="rgba(26,77,30,0.3)" stroke-width="0.7" fill="none"/>
          <path d="M-8 2 Q-16 4 -26 2" stroke="rgba(26,77,30,0.3)" stroke-width="0.7" fill="none"/>
        </g>

        <!-- Right leaf -->
        <g transform="translate(245, 425) rotate(20)">
          <path d="M0 0 Q18 -15 42 -20 Q55 -22 52 -10 Q45 8 22 15 Q5 18 0 0Z"
                fill="url(#leafGrad2)" filter="url(#softShadow)"/>
          <path d="M0 0 Q25 -8 46 -15" stroke="rgba(26,77,30,0.5)" stroke-width="1" fill="none"/>
          <path d="M12 -3 Q22 -12 32 -16" stroke="rgba(26,77,30,0.3)" stroke-width="0.7" fill="none"/>
          <path d="M10 3 Q18 4 28 1" stroke="rgba(26,77,30,0.3)" stroke-width="0.7" fill="none"/>
        </g>

        <!-- Small leaf on stem -->
        <g transform="translate(190, 460) rotate(-35)">
          <path d="M0 0 Q-8 -8 -22 -12 Q-30 -13 -28 -6 Q-22 4 -10 8 Q-2 9 0 0Z"
                fill="url(#leafGrad)" opacity="0.85"/>
        </g>
      </g>

      <!-- ===== SEPALS ===== -->
      <g class="stem-group">
        <path d="M200 275 Q175 278 160 295 Q155 302 165 298 Q180 288 200 280Z"
              fill="url(#sepalGrad)" opacity="0.9"/>
        <path d="M200 275 Q225 278 242 295 Q248 302 238 298 Q222 288 200 280Z"
              fill="url(#sepalGrad)" opacity="0.9"/>
        <path d="M200 272 Q188 280 178 300 Q176 306 182 300 Q192 284 200 278Z"
              fill="url(#sepalGrad)" opacity="0.7"/>
        <path d="M200 272 Q212 280 222 300 Q224 306 218 300 Q208 284 200 278Z"
              fill="url(#sepalGrad)" opacity="0.7"/>
      </g>

      <!-- ===== ROSE PETALS ===== -->

      <!-- Back outer petals (largest) -->
      <path class="petal petal-1" filter="url(#petalShadow)"
            d="M200 180 Q155 140 130 170 Q110 200 130 240 Q150 270 200 275 Q195 240 200 180Z"
            fill="url(#petalGrad3)" opacity="0.85"/>

      <path class="petal petal-2" filter="url(#petalShadow)"
            d="M200 180 Q245 140 270 170 Q290 200 270 240 Q250 270 200 275 Q205 240 200 180Z"
            fill="url(#petalGrad3)" opacity="0.85"/>

      <path class="petal petal-3" filter="url(#petalShadow)"
            d="M200 170 Q160 130 140 155 Q120 185 145 230 Q165 260 200 268 Q195 220 200 170Z"
            fill="url(#petalGrad1)" opacity="0.9"/>

      <path class="petal petal-4" filter="url(#petalShadow)"
            d="M200 170 Q240 125 265 155 Q285 185 260 230 Q238 258 200 268 Q206 220 200 170Z"
            fill="url(#petalGrad1)" opacity="0.88"/>

      <!-- Mid petals -->
      <path class="petal petal-5" filter="url(#petalShadow)"
            d="M200 175 Q165 150 148 178 Q135 205 155 238 Q175 260 200 262 Q192 225 200 175Z"
            fill="url(#petalGrad2)" opacity="0.92"/>

      <path class="petal petal-6" filter="url(#petalShadow)"
            d="M200 175 Q238 148 255 178 Q268 208 248 240 Q228 260 200 262 Q210 225 200 175Z"
            fill="url(#petalGrad2)" opacity="0.9"/>

      <path class="petal petal-7" filter="url(#petalShadow)"
            d="M200 178 Q172 158 158 182 Q145 210 165 240 Q182 257 200 258 Q190 228 200 178Z"
            fill="url(#petalGrad1)" opacity="0.93"/>

      <path class="petal petal-8" filter="url(#petalShadow)"
            d="M200 178 Q230 155 245 182 Q258 212 240 242 Q222 257 200 258 Q212 228 200 178Z"
            fill="url(#petalGrad1)" opacity="0.92"/>

      <!-- Inner petals -->
      <path class="petal petal-9" filter="url(#petalShadow)"
            d="M200 185 Q178 168 168 192 Q160 215 175 240 Q188 252 200 253 Q192 230 200 185Z"
            fill="url(#petalGradInner)" opacity="0.95"/>

      <path class="petal petal-10" filter="url(#petalShadow)"
            d="M200 185 Q224 165 235 192 Q242 218 228 242 Q214 252 200 253 Q210 230 200 185Z"
            fill="url(#petalGradInner)" opacity="0.94"/>

      <!-- Core petals (tightest curl) -->
      <path class="petal petal-11" filter="url(#petalShadow)"
            d="M200 192 Q184 180 177 200 Q172 220 184 240 Q194 248 200 248 Q194 232 200 192Z"
            fill="url(#petalGradDeep)" opacity="0.96"/>

      <path class="petal petal-12" filter="url(#petalShadow)"
            d="M200 192 Q218 178 225 200 Q230 222 218 242 Q208 248 200 248 Q208 232 200 192Z"
            fill="url(#petalGradDeep)" opacity="0.95"/>

      <!-- Center spiral -->
      <path class="petal petal-11"
            d="M200 200 Q192 195 190 208 Q188 222 196 235 Q200 240 200 240 Q196 228 200 200Z"
            fill="#5c0f25" opacity="0.9"/>
      <path class="petal petal-12"
            d="M200 200 Q210 194 213 210 Q215 225 206 236 Q202 240 200 240 Q206 228 200 200Z"
            fill="#5c0f25" opacity="0.85"/>

      <!-- Dew drops on petals -->
      <g class="petal petal-5">
        <ellipse cx="170" cy="220" rx="4" ry="5" fill="url(#dewDrop)" opacity="0.8"/>
        <ellipse cx="168" cy="218" rx="1.5" ry="1" fill="white" opacity="0.9"/>
      </g>
      <g class="petal petal-6">
        <ellipse cx="235" cy="210" rx="3.5" ry="4.5" fill="url(#dewDrop)" opacity="0.7"/>
        <ellipse cx="233.5" cy="208.5" rx="1.2" ry="0.8" fill="white" opacity="0.85"/>
      </g>
      <g class="petal petal-3">
        <ellipse cx="155" cy="195" rx="3" ry="3.5" fill="url(#dewDrop)" opacity="0.6"/>
        <ellipse cx="153.8" cy="193.8" rx="1" ry="0.7" fill="white" opacity="0.8"/>
      </g>
    </svg>
  </div>
</div>

<script>
  // Background stars
  const starsContainer = document.getElementById('bgStars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'bg-star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 3) + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    starsContainer.appendChild(star);
  }

  // Glowing particles around the rose
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = (30 + Math.random() * 40) + '%';
    p.style.bottom = '0%';
    p.style.background = `radial-gradient(circle, ${
      ['rgba(232,67,115,0.8)', 'rgba(255,180,200,0.8)', 'rgba(200,50,79,0.8)', 'rgba(255,150,170,0.9)'][Math.floor(Math.random()*4)]
    }, transparent)`;
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (2 + Math.random() * 5) + 's';
    p.style.boxShadow = `0 0 ${size*2}px rgba(232,67,115,0.5)`;
    particlesContainer.appendChild(p);
  }

  // Sparkles
  const sparklesContainer = document.getElementById('sparkles');
  for (let i = 0; i < 15; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (20 + Math.random() * 60) + '%';
    s.style.top = (15 + Math.random() * 55) + '%';
    s.style.animationDelay = (2 + Math.random() * 5) + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    sparklesContainer.appendChild(s);
  }

  // Falling petals
  const fallingContainer = document.getElementById('fallingPetals');
  for (let i = 0; i < 12; i++) {
    const petal = document.createElement('div');
    petal.className = 'falling-petal';
    petal.style.left = (10 + Math.random() * 80) + '%';
    petal.style.top = '-20px';
    petal.style.animationDuration = (6 + Math.random() * 8) + 's';
    petal.style.animationDelay = (3 + Math.random() * 10) + 's';
    const scale = 0.5 + Math.random() * 0.8;
    petal.style.width = (10 * scale) + 'px';
    petal.style.height = (12 * scale) + 'px';
    const colors = ['#c8324f', '#d44060', '#a02845', '#e84373'];
    petal.style.background = `radial-gradient(ellipse, ${colors[Math.floor(Math.random()*4)]}, #8b1a3a)`;
    fallingContainer.appendChild(petal);
  }
</script>
</body>
</html>
