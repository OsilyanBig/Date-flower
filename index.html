<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Çiçek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f7a3b3; /* Resimdeki tatlı pembe arka plan tonu */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* Çiçek Buketi Konteyneri */
        .flower-container {
            position: relative;
            z-index: 10;
            max-width: 90%;
            max-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: float 4s ease-in-out infinite; /* Hafif yukarı aşağı süzülme efekti */
        }

        .flower-container img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 20px;
            /* Buketin arkasına hafif bir ışıltı gölgesi */
            filter: drop-shadow(0 10px 20px rgba(255, 255, 255, 0.3)); 
        }

        /* Partiküller için Canvas (Arka Plan) */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Çiçeğin hafifçe süzülme animasyonu */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="flower-container">
        <img src="https://lh3.googleusercontent.com/d/1_x3V2M6L1vL660gqE0G0Q82HnUfRzIen" alt="Çiçek Buketi">
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 70; // Ekrandaki parıltı sayısı

        // Ekran boyutuna göre canvas'ı ayarla
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Partikül Sınıfı
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 1; // Küçük ve zarif parıltılar
                this.speedX = Math.random() * 1 - 0.5; // Sağa sola hafif salınım
                this.speedY = -(Math.random() * 1 + 0.5); // Yukarı doğru yavaşça yükselme
                // Beyaz, açık pembe ve altın sarısı tonlarında parıltılar
                const colors = ['rgba(255, 255, 255, 0.8)', 'rgba(255, 230, 235, 0.9)', 'rgba(255, 215, 0, 0.6)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Ekranın üstünden çıkan partikülü aşağıdan tekrar başlat
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
                if (this.x > canvas.width || this.x < 0) {
                    this.speedX = -this.speedX;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                // Parıltı efekti vermek için gölge ekliyoruz
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0; // Diğer çizimleri etkilemesin diye sıfırlıyoruz
            }
        }

        // Partikül dizisini doldur
        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Animasyon döngüsü
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
